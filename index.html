<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cookie Crash</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    background: #1a0a2e;
    background-image: radial-gradient(ellipse at 20% 20%, #2d1060 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 80%, #0d2060 0%, transparent 60%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 40%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 10%, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 25%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 60%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 35% 75%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 85%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 90%, rgba(255,255,255,0.4) 0%, transparent 100%);
    pointer-events: none;
  }

  .game-title {
    font-family: 'Fredoka One', cursive;
    font-size: 32px;
    color: #fff;
    text-shadow: 0 0 20px rgba(255,180,50,0.8), 0 2px 4px rgba(0,0,0,0.5);
    letter-spacing: 1px;
    margin-bottom: 12px;
  }

  .stats-bar {
    display: flex;
    gap: 20px;
    margin-bottom: 14px;
    align-items: center;
  }

  .stat-pill {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 6px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    backdrop-filter: blur(4px);
  }

  .stat-pill .icon { font-size: 16px; }
  .stat-value { font-family: 'Fredoka One', cursive; font-size: 18px; }

  #timer-bar-wrap {
    width: 100%;
    max-width: 540px;
    margin-bottom: 12px;
  }
  #timer-bar-bg {
    height: 8px;
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
    overflow: hidden;
  }
  #timer-bar {
    height: 100%;
    border-radius: 4px;
    transition: width 0.1s linear, background 0.3s;
    background: #4ade80;
  }

  #grid-container {
    display: grid;
    grid-template-columns: repeat(10, 48px);
    grid-template-rows: repeat(10, 48px);
    gap: 3px;
    padding: 12px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    backdrop-filter: blur(8px);
    position: relative;
  }

  .cell {
    width: 48px;
    height: 48px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
    background: rgba(255,255,255,0.05);
  }

  .cell:hover { transform: scale(1.08); }

  .cell.selected {
    box-shadow: 0 0 0 3px #fff, 0 0 16px rgba(255,255,255,0.4);
    transform: scale(1.1);
    z-index: 2;
  }

  .cell.clearing { animation: pop 0.35s ease forwards; }
  .cell.falling   { animation: fallIn 0.2s ease; }

  @keyframes pop {
    0%   { transform: scale(1.2); opacity: 1; }
    100% { transform: scale(0);   opacity: 0; }
  }
  @keyframes fallIn {
    0%   { transform: translateY(-20px); opacity: 0.4; }
    100% { transform: translateY(0);     opacity: 1;   }
  }

  .cookie {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    position: relative;
    transition: all 0.15s;
    pointer-events: none;
  }

  .cookie-0 { background: #ef4444; box-shadow: 0 3px 8px rgba(239,68,68,0.5),  inset 0 -2px 4px rgba(0,0,0,0.3), inset 0 2px 4px rgba(255,255,255,0.3); }
  .cookie-1 { background: #22c55e; box-shadow: 0 3px 8px rgba(34,197,94,0.5),   inset 0 -2px 4px rgba(0,0,0,0.3), inset 0 2px 4px rgba(255,255,255,0.3); }
  .cookie-2 { background: #3b82f6; box-shadow: 0 3px 8px rgba(59,130,246,0.5),  inset 0 -2px 4px rgba(0,0,0,0.3), inset 0 2px 4px rgba(255,255,255,0.3); }
  .cookie-3 { background: #eab308; box-shadow: 0 3px 8px rgba(234,179,8,0.5),   inset 0 -2px 4px rgba(0,0,0,0.3), inset 0 2px 4px rgba(255,255,255,0.3); }
  .cookie-4 { background: #ec4899; box-shadow: 0 3px 8px rgba(236,72,153,0.5),  inset 0 -2px 4px rgba(0,0,0,0.3), inset 0 2px 4px rgba(255,255,255,0.3); }

  .cookie::before {
    content: '';
    position: absolute;
    width: 6px; height: 6px;
    background: rgba(0,0,0,0.25);
    border-radius: 50%;
    top: 8px; left: 10px;
  }
  .cookie::after {
    content: '';
    position: absolute;
    width: 5px; height: 5px;
    background: rgba(0,0,0,0.2);
    border-radius: 50%;
    bottom: 9px; right: 9px;
  }

  .score-pop {
    position: absolute;
    font-family: 'Fredoka One', cursive;
    font-size: 20px;
    color: #facc15;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    pointer-events: none;
    animation: scoreFloat 0.9s ease forwards;
    z-index: 10;
  }
  @keyframes scoreFloat {
    0%   { opacity: 1; transform: translateY(0) scale(1);     }
    100% { opacity: 0; transform: translateY(-60px) scale(1.4); }
  }

  #gameover-overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(10,5,25,0.88);
    border-radius: 16px;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 20;
  }
  #gameover-overlay.show { display: flex; }

  .go-title { font-family: 'Fredoka One', cursive; font-size: 36px; color: #f87171; text-shadow: 0 0 20px rgba(248,113,113,0.6); }
  .go-score { font-family: 'Fredoka One', cursive; font-size: 24px; color: #facc15; }
  .go-sub   { color: rgba(255,255,255,0.6); font-size: 14px; }

  #restart-btn {
    margin-top: 8px;
    padding: 12px 32px;
    font-family: 'Fredoka One', cursive;
    font-size: 18px;
    color: #1a0a2e;
    background: #facc15;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    box-shadow: 0 4px 16px rgba(250,204,21,0.4);
  }
  #restart-btn:hover  { transform: scale(1.05); box-shadow: 0 6px 20px rgba(250,204,21,0.6); }
  #restart-btn:active { transform: scale(0.97); }

  .hint-text {
    color: rgba(255,255,255,0.35);
    font-size: 12px;
    margin-top: 10px;
    text-align: center;
  }
</style>
</head>
<body>

<div class="game-title">🍪 Cookie Crash</div>

<div class="stats-bar">
  <div class="stat-pill">
    <span class="icon">⭐</span>
    <span>Score</span>
    <span class="stat-value" id="score-display">0</span>
  </div>
  <div class="stat-pill">
    <span class="icon">⏱</span>
    <span>Time</span>
    <span class="stat-value" id="timer-display">60</span>
  </div>
  <div class="stat-pill">
    <span class="icon">🔥</span>
    <span>Best</span>
    <span class="stat-value" id="best-display">0</span>
  </div>
</div>

<div id="timer-bar-wrap">
  <div id="timer-bar-bg"><div id="timer-bar" style="width:100%"></div></div>
</div>

<div id="grid-container">
  <div id="gameover-overlay">
    <div class="go-title">GAME OVER!</div>
    <div class="go-score" id="go-score-text">Score: 0</div>
    <div class="go-sub"   id="go-best-text"></div>
    <button id="restart-btn">Play Again</button>
  </div>
</div>

<div class="hint-text">Click a cookie, then click an adjacent one to swap</div>

<script>
  const ROWS = 10, COLS = 10, GAME_TIME = 60;
  let grid = [], score = 0, bestScore = 0;
  let gameTimer = GAME_TIME, gameOver = false;
  let selR = -1, selC = -1;
  let timerInterval = null, processingMatches = false;

  function rand5() { return Math.floor(Math.random() * 5); }

  function initGrid() {
    grid = [];
    for (let i = 0; i < ROWS; i++) {
      grid.push([]);
      for (let j = 0; j < COLS; j++) grid[i].push(rand5());
    }
    for (let pass = 0; pass < 5; pass++) resolveInitialMatches();
  }

  function resolveInitialMatches() {
    for (let i = 0; i < ROWS; i++) {
      for (let j = 0; j < COLS; j++) {
        if (j >= 2 && grid[i][j] === grid[i][j-1] && grid[i][j] === grid[i][j-2])
          grid[i][j] = (grid[i][j] + 1 + Math.floor(Math.random()*3)) % 5;
        if (i >= 2 && grid[i][j] === grid[i-1][j] && grid[i][j] === grid[i-2][j])
          grid[i][j] = (grid[i][j] + 1 + Math.floor(Math.random()*3)) % 5;
      }
    }
  }

  function findMatches() {
    const marked = Array.from({length: ROWS}, () => Array(COLS).fill(false));
    for (let i = 0; i < ROWS; i++) {
      for (let j = 0; j < COLS - 2; j++) {
        if (grid[i][j] !== -1 && grid[i][j] === grid[i][j+1] && grid[i][j] === grid[i][j+2]) {
          marked[i][j] = marked[i][j+1] = marked[i][j+2] = true;
          let k = j + 3;
          while (k < COLS && grid[i][k] === grid[i][j]) { marked[i][k] = true; k++; }
        }
      }
    }
    for (let j = 0; j < COLS; j++) {
      for (let i = 0; i < ROWS - 2; i++) {
        if (grid[i][j] !== -1 && grid[i][j] === grid[i+1][j] && grid[i][j] === grid[i+2][j]) {
          marked[i][j] = marked[i+1][j] = marked[i+2][j] = true;
          let k = i + 3;
          while (k < ROWS && grid[k][j] === grid[i][j]) { marked[k][j] = true; k++; }
        }
      }
    }
    return marked;
  }

  function applyGravity() {
    for (let j = 0; j < COLS; j++) {
      let write = 0;
      for (let i = 0; i < ROWS; i++) {
        if (grid[i][j] !== -1) { grid[write][j] = grid[i][j]; write++; }
      }
      while (write < ROWS) { grid[write][j] = rand5(); write++; }
    }
  }

  function processMatches() {
    const marked = findMatches();
    let count = 0;
    for (let i = 0; i < ROWS; i++)
      for (let j = 0; j < COLS; j++)
        if (marked[i][j]) count++;

    if (count === 0) { processingMatches = false; renderGrid(); return; }

    score += count * 10;
    if (score > bestScore) bestScore = score;
    document.getElementById('score-display').textContent = score;
    document.getElementById('best-display').textContent  = bestScore;

    for (let i = 0; i < ROWS; i++) {
      for (let j = 0; j < COLS; j++) {
        if (marked[i][j]) {
          const cell = document.querySelector(`[data-r="${i}"][data-c="${j}"]`);
          if (cell) cell.classList.add('clearing');
          grid[i][j] = -1;
        }
      }
    }

    showScorePopup(count * 10);
    setTimeout(() => {
      applyGravity();
      renderGrid(true);
      setTimeout(() => processMatches(), 250);
    }, 350);
  }

  function showScorePopup(pts) {
    const gc  = document.getElementById('grid-container');
    const pop = document.createElement('div');
    pop.className   = 'score-pop';
    pop.textContent = '+' + pts;
    pop.style.left  = (Math.random() * 60 + 20) + '%';
    pop.style.top   = (Math.random() * 40 + 20) + '%';
    gc.appendChild(pop);
    setTimeout(() => pop.remove(), 900);
  }

  function renderGrid(falling = false) {
    const gc = document.getElementById('grid-container');
    gc.querySelectorAll('.cell').forEach(c => c.remove());

    for (let i = 0; i < ROWS; i++) {
      for (let j = 0; j < COLS; j++) {
        const cell = document.createElement('div');
        cell.className = 'cell' + (falling ? ' falling' : '');
        cell.dataset.r = i;
        cell.dataset.c = j;
        if (i === selR && j === selC) cell.classList.add('selected');

        if (grid[i][j] !== -1) {
          const cookie = document.createElement('div');
          cookie.className = `cookie cookie-${grid[i][j]}`;
          cell.appendChild(cookie);
        }

        cell.addEventListener('click', () => onCellClick(i, j));
        gc.appendChild(cell);
      }
    }
  }

  function onCellClick(r, c) {
    if (gameOver || processingMatches || grid[r][c] === -1) return;

    if (selR === -1) {
      selR = r; selC = c; renderGrid();
    } else {
      if (selR === r && selC === c) { selR = -1; selC = -1; renderGrid(); return; }

      const dist = Math.abs(selR - r) + Math.abs(selC - c);
      if (dist === 1) {
        const sr = selR, sc = selC;
        const tmp = grid[sr][sc]; grid[sr][sc] = grid[r][c]; grid[r][c] = tmp;
        selR = -1; selC = -1;
        renderGrid();
        processingMatches = true;

        const marked = findMatches();
        let hasMatch = false;
        for (let i = 0; i < ROWS && !hasMatch; i++)
          for (let j = 0; j < COLS && !hasMatch; j++)
            if (marked[i][j]) hasMatch = true;

        if (!hasMatch) {
          const tmp2 = grid[sr][sc]; grid[sr][sc] = grid[r][c]; grid[r][c] = tmp2;
          processingMatches = false;
          renderGrid();
        } else {
          setTimeout(() => processMatches(), 50);
        }
      } else {
        selR = r; selC = c; renderGrid();
      }
    }
  }

  function startTimer() {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      if (gameOver) return;
      gameTimer -= 0.1;
      const t = Math.max(0, Math.ceil(gameTimer));
      document.getElementById('timer-display').textContent = t;
      const pct = Math.max(0, gameTimer / GAME_TIME * 100);
      const bar = document.getElementById('timer-bar');
      bar.style.width      = pct + '%';
      bar.style.background = pct > 50 ? '#4ade80' : pct > 25 ? '#facc15' : '#f87171';
      if (gameTimer <= 0) endGame();
    }, 100);
  }

  function endGame() {
    gameOver = true;
    clearInterval(timerInterval);
    const overlay = document.getElementById('gameover-overlay');
    overlay.classList.add('show');
    document.getElementById('go-score-text').textContent = 'Score: ' + score;
    document.getElementById('go-best-text').textContent  =
      score >= bestScore ? '🏆 New best score!' : 'Best: ' + bestScore;
  }

  function startGame() {
    score = 0; gameTimer = GAME_TIME; gameOver = false;
    selR = -1; selC = -1; processingMatches = false;
    document.getElementById('score-display').textContent = '0';
    document.getElementById('timer-display').textContent = GAME_TIME;
    document.getElementById('best-display').textContent  = bestScore;
    document.getElementById('timer-bar').style.width      = '100%';
    document.getElementById('timer-bar').style.background = '#4ade80';
    document.getElementById('gameover-overlay').classList.remove('show');
    initGrid();
    renderGrid();
    startTimer();
  }

  document.getElementById('restart-btn').addEventListener('click', startGame);
  startGame();
</script>
</body>
</html>
